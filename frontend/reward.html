<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MythoVerse Rewards</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

:root{
--primary:#4b2e83;
--secondary:#6a4ccf;
--accent:#ff9800;
--gold:#ffd700;
--success:#2e7d32;
--light:#f6f4ff;
--text:#333;
--muted:#666;
--white:#fff;
--shadow:0 10px 30px rgba(0,0,0,0.1);
--gradient-main:linear-gradient(135deg,#4b2e83,#6a4ccf);
}

body{
background:linear-gradient(135deg,#f7f3ff,#eef3ff);
color:var(--text);
min-height:100vh;
}

header{
background:var(--gradient-main);
color:white;
padding:18px 30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
box-shadow:var(--shadow);
gap:12px;
}

.logo{
font-size:24px;
font-weight:bold;
}

.header-actions{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.header-actions a,
.header-actions button{
background:white;
color:var(--primary);
padding:10px 15px;
border-radius:8px;
font-weight:bold;
text-decoration:none;
border:none;
cursor:pointer;
}

.header-actions a:hover,
.header-actions button:hover{
transform:translateY(-2px);
}

.container{
max-width:1200px;
margin:30px auto;
padding:0 20px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:var(--shadow);
text-align:center;
}

.stat-card h2{
color:var(--primary);
margin-bottom:8px;
}

.stat-card p{
color:var(--muted);
font-size:14px;
}

.section-title{
font-size:24px;
color:var(--primary);
margin-bottom:20px;
}

.badge-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:40px;
}

.badge-card{
background:white;
border-radius:12px;
padding:20px;
box-shadow:var(--shadow);
text-align:center;
transition:0.3s;
}

.badge-card:hover{
transform:translateY(-5px);
}

.badge-icon{
font-size:40px;
margin-bottom:10px;
}

.badge-name{
font-weight:bold;
font-size:18px;
margin-bottom:6px;
}

.badge-desc{
font-size:13px;
color:var(--muted);
line-height:1.5;
}

.progress-card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:var(--shadow);
}

.progress-bar{
background:#ddd;
height:12px;
border-radius:10px;
margin-top:10px;
overflow:hidden;
}

.progress-fill{
background:var(--accent);
height:12px;
border-radius:10px;
width:0%;
transition:0.4s;
}

.achievement-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.achievement-card{
background:white;
padding:18px;
border-radius:10px;
box-shadow:var(--shadow);
}

.achievement-card h4{
color:var(--primary);
margin-bottom:6px;
}

.achievement-card p{
font-size:13px;
color:var(--muted);
line-height:1.5;
}

.loading-box,
.error-box{
background:white;
padding:18px;
border-radius:12px;
box-shadow:var(--shadow);
margin-bottom:20px;
}

.loading-box{
color:var(--primary);
font-weight:bold;
}

.error-box{
color:#c62828;
font-weight:bold;
}

@media(max-width:700px){
header{
padding:16px 20px;
}
.logo{
font-size:20px;
}
.container{
padding:0 14px;
}
}
</style>
</head>

<body>

<header>
  <div class="logo">🏆 MythoVerse Rewards</div>

  <div class="header-actions">
    <a href="dashboard.html">Dashboard</a>
    <a href="storyplayer.html">Stories</a>
    <a href="index.html">Home</a>
    <button onclick="logout()">Logout</button>
  </div>
</header>

<div class="container">

  <div id="statusBox" class="loading-box">Loading reward data...</div>

  <div class="stats">
    <div class="stat-card">
      <h2 id="xpValue">0 XP</h2>
      <p>Total Experience Points</p>
    </div>

    <div class="stat-card">
      <h2 id="badgesCount">0</h2>
      <p>Badges Earned</p>
    </div>

    <div class="stat-card">
      <h2 id="storiesCount">0</h2>
      <p>Stories Completed</p>
    </div>

    <div class="stat-card">
      <h2 id="streakValue">0 Days</h2>
      <p>Learning Streak</p>
    </div>
  </div>

  <div class="section-title">🎖 Earned Badges</div>
  <div class="badge-grid" id="badgeGrid"></div>

  <div class="section-title">⭐ Level Progress</div>

  <div class="progress-card">
    <h3 id="levelText">Level 1 → Level 2</h3>

    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <p id="xpNeedText" style="margin-top:8px;color:#666;">Loading progress...</p>
  </div>

  <div class="section-title" style="margin-top:40px;">🏅 Achievements</div>
  <div class="achievement-grid" id="achievementGrid"></div>

</div>

<script>
const API_REWARD = "http://localhost:5000/api/reward";
const token = localStorage.getItem("token");

if (!token) {
  alert("Please login first");
  window.location.href = "login.html";
}

async function apiGet(url) {
  const response = await fetch(url, {
    method: "GET",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${token}`
    }
  });

  const text = await response.text();

  try {
    const data = JSON.parse(text);

    if (!response.ok) {
      throw new Error(data.message || "Request failed");
    }

    return data;
  } catch (error) {
    console.error("Raw backend response:", text);
    throw new Error("Backend returned invalid response.");
  }
}

function renderRewardData(reward) {
  document.getElementById("xpValue").textContent = `${reward.xp || 0} XP`;
  document.getElementById("badgesCount").textContent = reward.badgesEarned || 0;
  document.getElementById("storiesCount").textContent = reward.storiesCompleted || 0;
  document.getElementById("streakValue").textContent = `${reward.learningStreak || 0} Days`;

  document.getElementById("levelText").textContent =
    `Level ${reward.currentLevel || 1} → Level ${reward.nextLevel || 2}`;

  document.getElementById("xpNeedText").textContent =
    `You need ${reward.xpNeeded || 0} XP more to reach the next level.`;

  document.getElementById("progressFill").style.width = `${reward.progressPercent || 0}%`;

  const badgeGrid = document.getElementById("badgeGrid");
  badgeGrid.innerHTML = "";

  (reward.badges || []).forEach((badge) => {
    badgeGrid.innerHTML += `
      <div class="badge-card">
        <div class="badge-icon">${badge.icon || "🏅"}</div>
        <div class="badge-name">${badge.name || "Badge"}</div>
        <div class="badge-desc">${badge.description || "Achievement unlocked."}</div>
      </div>
    `;
  });

  const achievementGrid = document.getElementById("achievementGrid");
  achievementGrid.innerHTML = "";

  (reward.achievements || []).forEach((achievement) => {
    achievementGrid.innerHTML += `
      <div class="achievement-card">
        <h4>${achievement.title || "Achievement"}</h4>
        <p>${achievement.description || "No description available."}</p>
      </div>
    `;
  });

  document.getElementById("statusBox").style.display = "none";
}

async function loadRewards() {
  try {
    const data = await apiGet(API_REWARD);
    renderRewardData(data.reward);
  } catch (error) {
    const statusBox = document.getElementById("statusBox");
    statusBox.className = "error-box";
    statusBox.textContent = error.message;
  }
}

function logout() {
  localStorage.removeItem("token");
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

document.addEventListener("DOMContentLoaded", function () {
  loadRewards();
});
</script>

</body>
</html>
