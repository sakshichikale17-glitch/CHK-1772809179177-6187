<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MythoVerse Parent Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#f8f3ff,#eef6ff,#fff7ef);
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:#222;
}

.login-wrapper{
width:100%;
max-width:1100px;
display:grid;
grid-template-columns:1fr 1fr;
background:white;
border-radius:25px;
overflow:hidden;
box-shadow:0 20px 50px rgba(0,0,0,0.1);
}

.left-panel{
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
padding:50px;
display:flex;
flex-direction:column;
justify-content:center;
}

.logo{
font-size:30px;
font-weight:bold;
margin-bottom:20px;
display:flex;
align-items:center;
gap:10px;
}

.logo-icon{
width:45px;
height:45px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,0.2);
}

.left-panel h1{
font-size:2.3rem;
margin-bottom:15px;
}

.left-panel p{
line-height:1.7;
opacity:0.9;
}

.right-panel{
padding:40px;
display:flex;
flex-direction:column;
justify-content:center;
}

.form-top{
margin-bottom:20px;
}

.form-top h2{
font-size:2rem;
margin-bottom:5px;
}

.parent-role{
display:inline-block;
padding:6px 12px;
background:#efe6ff;
color:#6a11cb;
border-radius:50px;
font-weight:bold;
font-size:0.9rem;
margin-top:8px;
}

.login-form{
display:grid;
gap:16px;
}

.input-group{
display:flex;
flex-direction:column;
gap:6px;
}

.input-box{
position:relative;
}

.input-box input{
width:100%;
padding:14px;
border-radius:10px;
border:1px solid #ddd;
background:#fafafa;
}

.input-icon{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.form-row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:14px;
gap:10px;
flex-wrap:wrap;
}

.login-btn{
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(135deg,#6a11cb,#2575fc);
color:white;
font-weight:bold;
cursor:pointer;
}

.login-btn:hover{
opacity:0.95;
}

.register-text{
text-align:center;
font-size:14px;
margin-top:10px;
}

.register-text a{
color:#6a11cb;
font-weight:bold;
text-decoration:none;
}

.message{
font-size:14px;
padding:10px;
border-radius:8px;
display:none;
}

.message.error{
background:#ffe6e6;
color:#d60000;
display:block;
}

.message.success{
background:#e6ffe6;
color:#008a00;
display:block;
}

@media(max-width:900px){
.login-wrapper{
grid-template-columns:1fr;
}
.left-panel{
display:none;
}
}
</style>
</head>

<body>

<div class="login-wrapper">

<div class="left-panel">
  <div class="logo">
    <div class="logo-icon">ॐ</div>
    MythoVerse
  </div>

  <h1>Welcome Back Parent</h1>

  <p>
    Continue your child's mythology learning journey with
    interactive stories, Sanskrit learning, and rewards.
  </p>
</div>

<div class="right-panel">

  <div class="form-top">
    <h2>Parent Login</h2>
    <div class="parent-role">Role : Parent</div>
  </div>

  <div id="messageBox" class="message"></div>

  <form class="login-form" id="loginForm">

    <input type="hidden" id="role" value="Parent">

    <div class="input-group">
      <label>Email</label>
      <div class="input-box">
        <input type="email" id="email" placeholder="Enter email" required>
      </div>
    </div>

    <div class="input-group">
      <label>Password</label>
      <div class="input-box">
        <input type="password" id="password" placeholder="Enter password" required>
        <span class="input-icon" id="togglePassword">👁️</span>
      </div>
    </div>

    <div class="form-row">
      <label>
        <input type="checkbox" id="remember"> Remember me
      </label>
      <a href="javascript:void(0)" onclick="forgotPassword()">Forgot password?</a>
    </div>

    <button class="login-btn" type="submit">Login</button>

    <div class="register-text">
      Don't have an account?
      <a href="register.html">Register</a>
    </div>

  </form>

</div>
</div>

<script>
const API = "http://localhost:5000/api/auth";

const loginForm = document.getElementById("loginForm");
const email = document.getElementById("email");
const password = document.getElementById("password");
const togglePassword = document.getElementById("togglePassword");
const messageBox = document.getElementById("messageBox");

togglePassword.onclick = () => {
  password.type = password.type === "password" ? "text" : "password";
};

function showMessage(type, text) {
  messageBox.className = "message " + type;
  messageBox.innerText = text;
}

function saveSession(data) {
  if (data.token) {
    localStorage.setItem("token", data.token);
  }

  if (data.user) {
    localStorage.setItem("user", JSON.stringify(data.user));
  }
}

loginForm.addEventListener("submit", async (e) => {
  e.preventDefault();

  const emailValue = email.value.trim();
  const passwordValue = password.value.trim();

  try {
    const res = await fetch(API + "/login", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        email: emailValue,
        password: passwordValue,
        role: "Parent"
      })
    });

    const data = await res.json();

    if (!res.ok) {
      showMessage("error", data.message || "Login failed");
      return;
    }

    saveSession(data);
    showMessage("success", "Login successful");

    setTimeout(() => {
      window.location.href = "dashboard.html";
    }, 1200);

  } catch (err) {
    showMessage("error", "Server not responding");
  }
});

function forgotPassword() {
  showMessage("error", "Forgot password feature will be added later.");
}
</script>

</body>
</html>
