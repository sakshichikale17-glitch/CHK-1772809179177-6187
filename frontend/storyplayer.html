<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MythoVerse Story Player</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    :root{
      --primary:#6b4eff;
      --primary-dark:#5638e6;
      --secondary:#ffca28;
      --accent:#ff4081;
      --success:#00c853;
      --danger:#e53935;
      --bg1:#fff0b3;
      --bg2:#ffd6f5;
      --card:#ffffff;
      --text:#2d2d2d;
      --muted:#666;
      --shadow:0 12px 30px rgba(0,0,0,0.12);
      --radius:18px;
    }

    body{
      font-family:Arial, sans-serif;
      background:linear-gradient(135deg,var(--bg1),var(--bg2));
      color:var(--text);
      min-height:100vh;
    }

    header{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:white;
      padding:24px 18px;
      text-align:center;
      box-shadow:var(--shadow);
      position:sticky;
      top:0;
      z-index:100;
    }

    header h2{
      font-size:30px;
      margin-bottom:8px;
    }

    .realm{
      font-size:15px;
      opacity:0.95;
      margin-bottom:12px;
    }

    .progressbar{
      height:12px;
      background:rgba(255,255,255,0.25);
      border-radius:999px;
      overflow:hidden;
      max-width:700px;
      margin:0 auto;
    }

    .progress{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#00e676,#76ff03);
      transition:0.35s ease;
    }

    .container{
      max-width:980px;
      margin:auto;
      padding:24px 18px 40px;
    }

    .top-links{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .top-links a{
      text-decoration:none;
      background:white;
      color:var(--primary);
      padding:10px 16px;
      border-radius:10px;
      font-weight:bold;
      box-shadow:0 6px 16px rgba(0,0,0,0.08);
      transition:0.25s;
    }

    .top-links a:hover{
      transform:translateY(-2px);
    }

    .status-box{
      margin-bottom:18px;
      padding:14px 16px;
      border-radius:12px;
      display:none;
      box-shadow:var(--shadow);
      font-weight:bold;
    }

    .scene{
      background:var(--card);
      border-radius:var(--radius);
      padding:26px;
      box-shadow:var(--shadow);
      margin-bottom:20px;
      border:1px solid rgba(0,0,0,0.04);
    }

    .scene img{
      width:100%;
      border-radius:14px;
      max-height:420px;
      object-fit:cover;
      background:#f2f2f2;
    }

    .narration{
      margin-top:18px;
      font-size:18px;
      line-height:1.8;
      color:#333;
    }

    .dialogue{
      background:linear-gradient(135deg,#f3f1ff,#ece8ff);
      padding:16px;
      border-left:6px solid var(--primary);
      border-radius:12px;
      margin-top:18px;
      line-height:1.7;
    }

    .controls{
      margin-top:14px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    button{
      border:none;
      padding:11px 16px;
      border-radius:10px;
      cursor:pointer;
      font-size:14px;
      font-weight:bold;
      transition:0.25s;
      box-shadow:0 5px 14px rgba(0,0,0,0.08);
    }

    button:hover{
      transform:translateY(-2px);
    }

    .play{
      background:linear-gradient(135deg,#00c853,#00e676);
      color:white;
    }

    .stop{
      background:linear-gradient(135deg,#ef5350,#e53935);
      color:white;
    }

    .choice{
      background:linear-gradient(135deg,#ffd54f,#ffca28);
      color:#3a2a00;
      width:100%;
      margin-top:10px;
    }

    .next{
      background:linear-gradient(135deg,var(--primary),var(--primary-dark));
      color:white;
    }

    .quiz{
      background:linear-gradient(135deg,#ff7043,#ff5722);
      color:white;
      width:100%;
      margin-top:10px;
    }

    .choice-container{
      background:rgba(255,255,255,0.88);
      padding:20px;
      border-radius:16px;
      box-shadow:var(--shadow);
      margin-top:20px;
    }

    .choice-container h3{
      margin-bottom:12px;
      color:var(--primary-dark);
    }

    .sanskrit-card{
      background:linear-gradient(135deg,#fff8e1,#fff3c4);
      padding:18px;
      border-radius:16px;
      margin-top:20px;
      box-shadow:var(--shadow);
    }

    .sanskrit-card h3{
      margin-bottom:10px;
      color:#8a5b00;
    }

    .sanskrit-card strong{
      font-size:20px;
      display:block;
      margin-bottom:8px;
    }

    .quiz-box{
      background:linear-gradient(135deg,#e3f2fd,#eef7ff);
      padding:20px;
      border-radius:16px;
      margin-top:20px;
      display:none;
      box-shadow:var(--shadow);
    }

    .quiz-box h3{
      margin-bottom:12px;
      color:#1565c0;
    }

    .progress-scenes{
      display:flex;
      gap:10px;
      margin-top:20px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .scene-dot{
      width:30px;
      height:30px;
      border-radius:50%;
      background:#d7d7d7;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:bold;
    }

    .active{
      background:var(--primary);
      color:white;
    }

    .completed{
      background:var(--success);
      color:white;
    }

    .footer-nav{
      margin-top:22px;
      text-align:center;
    }

    .popup{
      position:fixed;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:26px;
      border-radius:18px;
      box-shadow:0 18px 50px rgba(0,0,0,0.22);
      display:none;
      z-index:999;
      max-width:430px;
      width:92%;
      text-align:center;
    }

    .popup h2{
      color:var(--primary);
      margin-bottom:12px;
    }

    .popup p{
      line-height:1.7;
      color:#444;
    }

    .reward{
      font-size:20px;
      color:#ff9800;
      margin-top:12px;
      font-weight:bold;
      line-height:1.8;
    }

    .chat-btn{
      position:fixed;
      bottom:24px;
      right:24px;
      background:linear-gradient(135deg,#ff4081,#f50057);
      color:white;
      padding:16px 18px;
      border-radius:50%;
      font-size:22px;
      box-shadow:0 12px 30px rgba(245,0,87,0.3);
      width:60px;
      height:60px;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .loading-text{
      color:#666;
      font-style:italic;
    }

    @media(max-width:700px){
      header h2{
        font-size:24px;
      }

      .narration{
        font-size:16px;
      }

      .scene{
        padding:18px;
      }

      .controls button,
      .footer-nav button{
        width:100%;
      }

      .chat-btn{
        bottom:18px;
        right:18px;
      }
    }
  </style>
</head>
<body>

  <header>
    <h2 id="storyTitle">Loading story...</h2>
    <div class="realm" id="storyMeta">Realm: Loading...</div>

    <div class="progressbar">
      <div class="progress" id="progress"></div>
    </div>
  </header>

  <div class="container">

    <div class="top-links">
      <a href="dashboard.html">Dashboard</a>
      <a href="reward.html">Rewards</a>
      <a href="index.html">Home</a>
    </div>

    <div id="statusBox" class="status-box"></div>

    <div class="scene">
      <img
        id="storyImage"
        src="https://upload.wikimedia.org/wikipedia/commons/3/3c/Kurukshetra_battle.jpg"
        alt="Story Scene"
      >

      <div class="narration loading-text" id="storyText">
        Loading story content from database...
      </div>

      <div class="controls">
        <button class="play" onclick="speakStory()">▶ Narrate</button>
        <button class="stop" onclick="stopSpeech()">■ Stop</button>
      </div>

      <div class="dialogue" id="storyDialogue">
        <strong>Guide:</strong> Loading dialogue...
      </div>
    </div>

    <div class="choice-container" id="choices">
      <h3 id="choiceQuestion">Loading choices...</h3>

      <button class="choice" id="choice1" onclick="choose(0)">Choice 1</button>
      <button class="choice" id="choice2" onclick="choose(1)">Choice 2</button>
      <button class="choice" id="choice3" onclick="choose(2)">Choice 3</button>
    </div>

    <div class="sanskrit-card">
      <h3>Sanskrit Word</h3>
      <strong id="sanskritWord">Loading...</strong>
      <p id="sanskritMeaning">Meaning: Loading...</p>
      <br>
      <button class="play" onclick="speakWord()">🔊 Hear Pronunciation</button>
    </div>

    <div class="quiz-box" id="quiz">
      <h3>Mini Quiz</h3>

      <div id="quizQuestion">Loading quiz...</div>

      <br>

      <button class="quiz" id="quiz1" onclick="quizAnswer(0)">Option 1</button>
      <button class="quiz" id="quiz2" onclick="quizAnswer(1)">Option 2</button>
      <button class="quiz" id="quiz3" onclick="quizAnswer(2)">Option 3</button>
    </div>

    <div class="progress-scenes" id="sceneDots"></div>

    <div class="footer-nav">
      <button class="next" onclick="nextScene()">Next Scene ➜</button>
    </div>
  </div>

  <div class="popup" id="valuePopup">
    <h2 id="valueTitle">⭐ Value Learned</h2>
    <p id="valueText">Loading value...</p>

    <div class="reward" id="rewardText">
      +0 Dharma Points
    </div>

    <br>

    <button class="next" onclick="closePopup()">Continue</button>
  </div>

  <button class="chat-btn" onclick="talkCharacter()">💬</button>

  <script>
    const API_BASE = "http://localhost:5000/api/story";
    const token = localStorage.getItem("token");
    const user = JSON.parse(localStorage.getItem("user"));

    const params = new URLSearchParams(window.location.search);
    const storySlug = params.get("story") || "abhimanyu";

    let progressValue = 0;
    let currentStory = null;
    let currentQuiz = null;

    if (!token || !user) {
      alert("Please login first");
      window.location.href = "login.html";
    }

    function showStatus(message, isError = false) {
      const box = document.getElementById("statusBox");
      box.style.display = "block";
      box.style.background = isError ? "#ffe5e5" : "#eefcf1";
      box.style.color = isError ? "#c62828" : "#2e7d32";
      box.textContent = message;
    }

    async function parseResponse(response) {
      const text = await response.text();

      try {
        const data = JSON.parse(text);

        if (!response.ok) {
          throw new Error(data.message || "Request failed");
        }

        return data;
      } catch (error) {
        console.error("Raw backend response:", text);
        throw new Error("Backend returned invalid response.");
      }
    }

    async function apiGet(url) {
      const response = await fetch(url, {
        method: "GET",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        }
      });

      return parseResponse(response);
    }

    async function apiPost(url, bodyData) {
      const response = await fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${token}`
        },
        body: JSON.stringify(bodyData)
      });

      return parseResponse(response);
    }

    function renderSceneDots(chapter, totalChapters) {
      const sceneDots = document.getElementById("sceneDots");
      sceneDots.innerHTML = "";

      for (let i = 1; i <= totalChapters; i++) {
        const dot = document.createElement("div");
        dot.className = "scene-dot";

        if (i < chapter) {
          dot.classList.add("completed");
        }

        if (i === chapter) {
          dot.classList.add("active");
        }

        dot.textContent = i;
        sceneDots.appendChild(dot);
      }
    }

    function setButtonText(id, text) {
      const btn = document.getElementById(id);
      btn.textContent = text;
    }

    function renderStory(story) {
      currentStory = story;
      currentQuiz = story.quiz || null;

      document.getElementById("storyTitle").textContent = story.title || "Story Title";

      document.getElementById("storyMeta").textContent =
        `Realm: ${story.realm || "Unknown"} | Chapter ${story.chapter || 1} of ${story.totalChapters || 1}`;

      document.getElementById("storyImage").src =
        story.image || "https://upload.wikimedia.org/wikipedia/commons/3/3c/Kurukshetra_battle.jpg";

      document.getElementById("storyText").textContent =
        story.narration || "No story narration found.";
      document.getElementById("storyText").classList.remove("loading-text");

      document.getElementById("storyDialogue").innerHTML =
        `<strong>${story.guideName || "Guide"}:</strong> ${story.dialogue || "No dialogue available."}`;

      document.getElementById("choiceQuestion").textContent =
        story.choiceQuestion || "Choose an option:";

      setButtonText("choice1", story.choices?.[0] || "Choice 1");
      setButtonText("choice2", story.choices?.[1] || "Choice 2");
      setButtonText("choice3", story.choices?.[2] || "Choice 3");

      document.getElementById("sanskritWord").textContent =
        story.sanskrit?.word || "Dharma (धर्म)";

      document.getElementById("sanskritMeaning").textContent =
        `Meaning: ${story.sanskrit?.meaning || "Duty / righteousness"}`;

      document.getElementById("quizQuestion").textContent =
        currentQuiz?.question || "Quiz not available";

      setButtonText("quiz1", currentQuiz?.options?.[0] || "Option 1");
      setButtonText("quiz2", currentQuiz?.options?.[1] || "Option 2");
      setButtonText("quiz3", currentQuiz?.options?.[2] || "Option 3");

      progressValue = story.progress || 0;
      document.getElementById("progress").style.width = progressValue + "%";

      renderSceneDots(story.chapter || 1, story.totalChapters || 1);

      document.getElementById("choices").style.display =
        story.choices && story.choices.length ? "block" : "none";

      document.getElementById("quiz").style.display = "none";
    }

    async function loadStory() {
      try {
        const data = await apiGet(`${API_BASE}/${storySlug}`);
        renderStory(data.story);
        showStatus("Story loaded successfully.");
      } catch (error) {
        showStatus(error.message, true);
        document.getElementById("storyText").textContent = "Could not load story from backend.";
        document.getElementById("storyText").classList.remove("loading-text");
      }
    }

    function speakStory() {
      const text = document.getElementById("storyText").innerText;

      speechSynthesis.cancel();

      const speech = new SpeechSynthesisUtterance(text);
      speech.rate = 0.9;
      speech.pitch = 1;
      speech.lang = "en-US";
      speechSynthesis.speak(speech);
    }

    function speakWord() {
      const wordText = document.getElementById("sanskritWord").innerText;

      speechSynthesis.cancel();

      const speech = new SpeechSynthesisUtterance(wordText);
      speech.rate = 0.8;
      speech.pitch = 1;
      speech.lang = "hi-IN";
      speechSynthesis.speak(speech);
    }

    function stopSpeech() {
      speechSynthesis.cancel();
    }

    async function choose(optionIndex) {
      try {
        if (!currentStory || !currentStory.choices) {
          alert("Story choices not loaded yet.");
          return;
        }

        const selectedChoice = currentStory.choices[optionIndex];

        const data = await apiPost(`${API_BASE}/save-choice`, {
          storyId: currentStory.storyId,
          selectedChoice: selectedChoice
        });

        document.getElementById("valueTitle").textContent =
          `⭐ Value Learned: ${data.valueTitle || "Courage"}`;

        document.getElementById("valueText").textContent =
          data.valueText || "A value was learned through your choice.";

        document.getElementById("rewardText").innerHTML =
          `+${data.dharmaPoints || 0} Dharma Points<br>+${data.gyanCoins || 0} Gyan Coins`;

        document.getElementById("valuePopup").style.display = "block";
      } catch (error) {
        alert(error.message);
      }
    }

    function closePopup() {
      document.getElementById("valuePopup").style.display = "none";

      if (currentQuiz) {
        document.getElementById("quiz").style.display = "block";
      }
    }

    async function quizAnswer(answerIndex) {
      try {
        if (!currentQuiz || !currentQuiz.options) {
          alert("Quiz not loaded yet.");
          return;
        }

        const selectedAnswer = currentQuiz.options[answerIndex];

        const data = await apiPost(`${API_BASE}/save-quiz`, {
          storyId: currentStory.storyId,
          selectedAnswer: selectedAnswer
        });

        alert(data.message || "Quiz submitted successfully.");
      } catch (error) {
        alert(error.message);
      }
    }

    async function nextScene() {
      try {
        if (!currentStory) {
          alert("Story is not loaded yet.");
          return;
        }

        const data = await apiPost(`${API_BASE}/next-scene`, {
          storyId: currentStory.storyId
        });

        progressValue = data.progress || progressValue + 20;
        document.getElementById("progress").style.width = progressValue + "%";

        if (data.story) {
          renderStory(data.story);
        } else {
          document.getElementById("storyText").textContent =
            data.nextNarration || "Next scene loaded.";

          document.getElementById("choices").style.display = "none";
        }

        showStatus("Next scene loaded.");
      } catch (error) {
        alert(error.message);
      }
    }

    async function talkCharacter() {
      if (!currentStory) {
        alert("Story is not loaded yet.");
        return;
      }

      const q = prompt("Ask the story character something:");

      if (!q) return;

      try {
        const data = await apiPost(`${API_BASE}/character-chat`, {
          storyId: currentStory.storyId,
          question: q
        });

        alert(
          `${data.characterName || "Character"} says: ${data.reply || "Courage grows when you take one small step with faith."}`
        );
      } catch (error) {
        alert(error.message);
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      loadStory();
    });
  </script>
</body>
</html>
